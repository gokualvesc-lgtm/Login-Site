<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Área Administrativa</h1>
    <p>Bem-vindo à área administrativa do sistema. Senhor {{nome}}</p>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Senha</th>
            <th>Admin</th>
        </tr>

        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario[0] }}</td>
            <td>{{ usuario[1] }}</td>
            <td>{{ usuario[2] }}</td>
            <td>{{ usuario[3] }}</td>
        </tr>
        {% endfor %}

</table>

</body>
</html>
